# yaml-language-server: $schema=https://taskfile.dev/schema.json
# https://taskfile.dev
#
# Generic root Taskfile. This is the canonical copy served to every repo that
# adopts methridge/taskfiles; it is identical across all consumers. Repos vendor
# the shared task files into .taskfiles/shared/ and keep their own tasks in
# .taskfiles/project/project.yml. Refresh with `task sync`; bootstrap a new repo
# with the init.sh one-liner (see README.md).

version: "3"

includes:
  git:
    taskfile: .taskfiles/shared/git.yml
    flatten: true
  go:
    taskfile: .taskfiles/shared/go.yml
    flatten: true
    optional: true
  ansible:
    taskfile: .taskfiles/shared/ansible.yml
    flatten: true
    optional: true
  project:
    taskfile: .taskfiles/project/project.yml
    flatten: true
    optional: true

tasks:
  default:
    desc: Show available tasks
    aliases: [help]
    cmds:
      - task --list-all

  sync:
    desc: Re-vendor the generic root + shared taskfiles from methridge/taskfiles
    vars:
      REF: '{{.REF | default "v1.0.0"}}'
      SHARED: '{{.SHARED | default "git.yml scripts/lib.sh scripts/merge.sh scripts/review.sh"}}'
      BASE: 'https://raw.githubusercontent.com/methridge/taskfiles/{{.REF}}'
    cmds:
      # Generic root — safe to overwrite; project tasks live in .taskfiles/project/.
      - curl -fsSL "{{.BASE}}/Taskfile.yaml" -o Taskfile.yaml
      - for: { var: SHARED, split: " " }
        cmd: |
          mkdir -p ".taskfiles/shared/$(dirname "{{.ITEM}}")"
          curl -fsSL "{{.BASE}}/.taskfiles/shared/{{.ITEM}}" -o ".taskfiles/shared/{{.ITEM}}"
          case "{{.ITEM}}" in *.sh) chmod +x ".taskfiles/shared/{{.ITEM}}" ;; esac
